  const tabsEl = document.getElementById('catTabs');
  const listEl = document.getElementById('vocList');
  const cats = Object.keys(VOC);

  // Build tabs
  let tabsHtml = `<button class="tab active" data-cat="todos">Todas</button>`;
  cats.forEach(c => {
    tabsHtml += `<button class="tab" data-cat="${c}">${VOC[c].icon} ${VOC[c].label}</button>`;
  });
  tabsEl.innerHTML = tabsHtml;

  function renderCat(catKey) {
    if (catKey === 'todos') {
      listEl.innerHTML = cats.map(k => renderSingleCat(k)).join('');
    } else {
      listEl.innerHTML = renderSingleCat(catKey);
    }
  }

  function renderSingleCat(k) {
    const cat = VOC[k];
    const items = cat.items.map(it => `
      <li data-search="${(it.pt + ' ' + it.ar + ' ' + it.arabizi).toLowerCase()}">
        <span class="pt">${it.pt}</span>
        <span class="ar">${it.ar}</span>
        <span class="arabizi">${it.arabizi}</span>
      </li>
    `).join('');
    return `
      <section data-cat="${k}">
        <h2><span class="num">${cat.icon}</span>${cat.label} <span style="color:#9ca3af; font-size:13px; font-weight:400; margin-left:6px;">${cat.items.length}</span></h2>
        <ul class="word-list">${items}</ul>
      </section>
    `;
  }

  renderCat('todos');

  // Tab switching
  tabsEl.addEventListener('click', (e) => {
    const t = e.target.closest('.tab');
    if (!t) return;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    renderCat(t.dataset.cat);
    document.getElementById('search').value = '';
  });

  // Search
  document.getElementById('search').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      const active = document.querySelector('.tab.active').dataset.cat;
      renderCat(active);
      return;
    }
    // Show all categories, filter items
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelector('.tab[data-cat="todos"]').classList.add('active');
    renderCat('todos');
    document.querySelectorAll('.word-list li').forEach(li => {
      const txt = li.dataset.search;
      li.style.display = txt.includes(q) ? '' : 'none';
    });
    // Hide empty sections
    document.querySelectorAll('section[data-cat]').forEach(sec => {
      const visible = Array.from(sec.querySelectorAll('.word-list li')).some(li => li.style.display !== 'none');
      sec.style.display = visible ? '' : 'none';
    });
  });
</script>
